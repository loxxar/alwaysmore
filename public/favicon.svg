<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradients pour Xal'atath -->
    <linearGradient id="bladeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a1f" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#2d0a3a" />
    </linearGradient>

    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </radialGradient>

    <linearGradient id="corruptionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>

    <!-- Filtre de lueur -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fond circulaire sombre -->
  <circle cx="50" cy="50" r="45" fill="#0a050f" stroke="#1a0a1f" stroke-width="2" />

  <!-- Lame de Xal'atath -->
  <path d="M50,20 L60,50 L50,80 L40,50 Z" fill="url(#bladeGradient)" stroke="#8b5cf6" stroke-width="1.5" />

  <!-- Garde de la dague -->
  <circle cx="50" cy="50" r="8" fill="#2d0a3a" stroke="#8b5cf6" stroke-width="1.5" />

  <!-- Œil de Xal'atath -->
  <circle cx="50" cy="50" r="4" fill="url(#eyeGradient)" filter="url(#glow)" />

  <!-- Veines de corruption -->
  <path d="M50,30 Q55,35 50,40 Q45,45 50,50 Q55,55 50,60 Q45,65 50,70"
        fill="none" stroke="url(#corruptionGradient)" stroke-width="1" stroke-linecap="round" opacity="0.7" />

  <!-- Effets de particules -->
  <circle cx="35" cy="35" r="1.5" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="65" cy="65" r="1.5" fill="#d97706" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="65" cy="35" r="1.5" fill="#7dd3fc" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="35" cy="65" r="1.5" fill="#10b981" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite" />
  </circle>

  <!-- Bordure décorative -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#581c87" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.5" />
</svg>
